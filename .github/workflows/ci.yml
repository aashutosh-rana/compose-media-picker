name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm:
    name: JVM build + tests + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (JVM targets)
        run: ./gradlew :media-picker:assemble :media-picker:jvmTest :media-picker:compileKotlinDesktop

      - name: Lint
        run: ./gradlew detekt ktlintCheck

      - name: API check
        run: ./gradlew :media-picker:apiCheck

      - name: Benchmark (informational)
        run: ./gradlew :benchmark:run

  android:
    name: Android library + sample
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble library
        run: ./gradlew :media-picker:assembleRelease

      - name: Assemble sample APK
        run: ./gradlew :samples:composeApp:assembleDebug

  ios:
    name: iOS framework + sample
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4

      - name: Build library framework (all archs)
        run: ./gradlew :media-picker:linkDebugFrameworkIosSimulatorArm64 :media-picker:linkDebugFrameworkIosX64

      - name: Build sample framework (simulator)
        run: ./gradlew :samples:composeApp:linkDebugFrameworkIosSimulatorArm64

  web:
    name: Web (wasmJs) build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4

      - name: Build web sample
        run: ./gradlew :samples:composeApp:wasmJsBrowserDistribution

  desktop:
    name: Desktop sample
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4

      - name: Build desktop distribution
        run: ./gradlew :samples:composeApp:packageDistributionForCurrentOS
